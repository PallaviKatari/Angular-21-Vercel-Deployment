<h3>{{ title }}</h3>

<img [src]="imageUrl" alt="Angular Logo" width="200" />

<button (click)="changeImage()">Change Image</button>  

<button (click)="handleClick()">Click Me</button>

<input (keydown)="onKeydown($event)" placeholder="Type something">
<p>{{keyPressed}}</p>

<input (focus)="onFocus()" (blur)="onBlur()" placeholder="Focus and Blur">
<p>@if (focused) {
  <p>Input is focused!</p>
} @else {
  <p>Input is blurred!</p>
}</p>

<h2>Two-way Binding</h2>
<input [(ngModel)]="twoWayValue" placeholder="Edit me">
<p>{{ twoWayValue }}</p>
